<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeBook</title>

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="Discover delicious recipes like Apple Crisp and more!">
  <meta property="og:url" content="https://yourdomain.com/recipes">
  <meta property="og:image" content="images/social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="Discover delicious recipes like Apple Crisp and more!">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <!-- Favicon and Apple Touch Icon -->
  <link rel="icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Google Font: Amatic SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="recipecard.css">
</head>
<body>
  <header class="header">
    <div class="logo-title">
      <img src="images/recipe-book.png" alt="RecipeBook logo">
      <h1>RecipeBook</h1>
    </div>

    <div class="search">
      <input type="text" placeholder="Find a recipe">
      <button><img src="images/search.svg" alt="search icon"></button>
    </div>
  </header>

  <main class="recipe">
    <img src="images/apple-crisp.jpg" alt="Apple Crisp dessert">
    <div class="recipe-info">
      <p class="tag">dessert</p>
      <h2>Apple Crisp</h2>

      <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star-empty">☆</span>
      </span>

      <p class="description">
        This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
      </p>
    </div>
  </main>

  <footer class="footer">
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
