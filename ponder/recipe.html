<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecipeBook</title>

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="Discover delicious recipes like Apple Crisp and more!">
  <meta property="og:url" content="https://yourdomain.com/recipes">
  <meta property="og:image" content="images/social-preview-image.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="Discover delicious recipes like Apple Crisp and more!">
  <meta name="twitter:image" content="images/social-preview-image.png">

  <!-- Favicon and Apple Touch Icon -->
  <link rel="icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Google Font: Amatic SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="recipecard.css">
  <script defer src="recipes.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo-title">
      <img src="images/recipe-book.png" alt="RecipeBook logo">
      <h1>RecipeBook</h1>
    </div>

    <div class="search">
      <input type="text" id="search" placeholder="Find a recipe">
      <button id="search-button"><img src="images/search.svg" alt="search icon"></button>
    </div>
  </header>

  <main id="recipe-container">
    <!-- recipe cards are rendered here by recipes.js -->
  </main>

  <footer class="footer">
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
